<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Link Buttons</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #f4f4f9;
        }
        .button-container {
            display: flex;
            flex-direction: column;
            gap: 15px; /* Space between buttons */
        }
        .btn {
            display: inline-block;
            padding: 15px 30px;
            font-size: 18px;
            text-align: center;
            text-decoration: none;
            color: white;
            background-color: #007BFF;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            transition: background-color 0.3s, transform 0.2s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .btn:hover {
            background-color: #0056b3;
            transform: translateY(-2px);
        }
        .btn:active {
            transform: translateY(0);
        }
        /* Custom colors for different buttons */
        .btn-green { background-color: #28a745; }
        .btn-green:hover { background-color: #218838; }
        
        .btn-red { background-color: #dc3545; }
        .btn-red:hover { background-color: #c82333; }
    </style>
</head>
<body>

    <h1>My Favorite Links</h1>

    <div class="button-container">
        <a href="ai.html" target="_blank" class="btn">Go to Google</a>
        <a href="1.html" target="_blank" class="btn btn-green">Watch YouTube</a>
        <a href="ui4.html" target="_blank" class="btn btn-red">Add Your Link Here</a>
    </div>

</body>
</html>
